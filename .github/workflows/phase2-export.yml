name: Phase 2 Export

on:
  pull_request:
    branches: [agent/phase-1-remove-liqpay]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Archive working tree
        shell: bash
        run: tar --exclude=.git --exclude=node_modules --exclude=.next -czf phase2-repository.tar.gz .
      - name: Upload working tree
        uses: actions/upload-artifact@v4
        with:
          name: phase2-repository
          path: phase2-repository.tar.gz
          retention-days: 1
