name: Phase 5 Verify

on:
  pull_request:
    branches: [agent/phase-4-lemon-squeezy-billing]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key-placeholder-at-least-twenty-characters
      SUPABASE_URL: https://ci-placeholder.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-placeholder-at-least-twenty-characters
      LEMONSQUEEZY_API_KEY: ci-lemon-api-placeholder-at-least-twenty-characters
      LEMONSQUEEZY_STORE_ID: ci-store
      LEMONSQUEEZY_WEBHOOK_SECRET: ci-webhook-placeholder-at-least-twenty-characters
      LEMONSQUEEZY_PERSONAL_VARIANT_ID: ci-personal
      LEMONSQUEEZY_WORK_VARIANT_ID: ci-work
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - run: npm install --global yarn@1.22.22
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: yarn typecheck
      - run: yarn test
      - name: Production build
        id: build
        continue-on-error: true
        run: yarn build > phase5-build.log 2>&1
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase5-build-log
          path: phase5-build.log
          retention-days: 1
      - name: Fail when build failed
        if: steps.build.outcome == 'failure'
        run: tail -n 120 phase5-build.log && exit 1
