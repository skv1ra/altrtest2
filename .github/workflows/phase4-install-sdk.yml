name: Phase 4 Install Lemon Squeezy SDK

on:
  push:
    branches: [agent/phase-4-lemon-squeezy-billing]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-4-lemon-squeezy-billing
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - name: Install Yarn
        run: npm install --global yarn@1.22.22
      - name: Add official Lemon Squeezy SDK
        run: yarn add --exact @lemonsqueezy/lemonsqueezy.js@4.0.0
      - name: Commit dependency files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json yarn.lock
          git diff --cached --quiet || git commit -m "chore: add official Lemon Squeezy SDK"
          git push origin HEAD:agent/phase-4-lemon-squeezy-billing
