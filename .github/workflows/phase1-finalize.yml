name: Phase 1 Finalize

on:
  workflow_dispatch:
  push:
    branches: [agent/phase-1-remove-liqpay]
    paths:
      - ".phase1/payload.b64"
      - ".github/workflows/phase1-finalize.yml"

permissions:
  contents: write

concurrency:
  group: phase1-finalize
  cancel-in-progress: true

env:
  CI: true
  NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
  NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key-placeholder-at-least-twenty-characters
  SUPABASE_SERVICE_ROLE_KEY: ci-service-role-placeholder-at-least-twenty-characters
  LEMONSQUEEZY_API_KEY: ci-lemon-api-placeholder-at-least-twenty-characters
  LEMONSQUEEZY_STORE_ID: ci-store
  LEMONSQUEEZY_WEBHOOK_SECRET: ci-webhook-placeholder-at-least-twenty-characters
  LEMONSQUEEZY_PERSONAL_VARIANT_ID: ci-personal
  LEMONSQUEEZY_WORK_VARIANT_ID: ci-work

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-1-remove-liqpay
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install --global yarn@1.22.22
      - name: Apply Phase 1 payload
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .phase1/payload.b64 > /tmp/phase1.tar.gz
          echo "45b1477cfaa5c4b2fcedaad2392931b6ecd67e9865c4732aa2b5dd7acce90542  /tmp/phase1.tar.gz" | sha256sum --check
          tar -xzf /tmp/phase1.tar.gz -C .
          rm -f lib/liqpay.ts lib/email.ts lib/supabaseServer.ts app/api/payments/email/route.ts tsconfig.tsbuildinfo
      - run: yarn install --frozen-lockfile --non-interactive
      - run: yarn run format
      - run: yarn run format:check
      - run: yarn run check
      - run: yarn playwright install --with-deps chromium
      - run: yarn run test:e2e
      - name: Commit verified Phase 1 changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git reset .github/workflows/phase1-finalize.yml .phase1/payload.b64
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "feat: completely remove LiqPay runtime"
          git push origin HEAD:agent/phase-1-remove-liqpay

# trigger after PR creation
