name: Phase 5 Export

on:
  pull_request:
    branches: [agent/phase-4-lemon-squeezy-billing]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Archive repository
        run: tar --exclude=.git --exclude=phase5-source.tar.gz -czf phase5-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: phase5-source
          path: phase5-source.tar.gz
          retention-days: 1