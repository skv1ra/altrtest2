name: Phase 0 Finalize

on:
  push:
    branches:
      - agent/phase-0-repository-foundation
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: phase0-finalize-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
  NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key-placeholder-at-least-twenty-characters
  SUPABASE_URL: https://ci-placeholder.supabase.co
  SUPABASE_SERVICE_ROLE_KEY: ci-service-role-placeholder-at-least-twenty-characters
  LEMONSQUEEZY_API_KEY: ci-lemon-api-placeholder-at-least-twenty-characters
  LEMONSQUEEZY_STORE_ID: ci-store
  LEMONSQUEEZY_WEBHOOK_SECRET: ci-webhook-placeholder-at-least-twenty-characters
  LEMONSQUEEZY_PERSONAL_VARIANT_ID: ci-personal
  LEMONSQUEEZY_WORK_VARIANT_ID: ci-work

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Phase 0 branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase-0-repository-foundation
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Yarn 1.22.22
        run: npm install --global yarn@1.22.22

      - name: Download and apply prepared Phase 0 files
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          curl --fail-with-body --location --silent --show-error \
            --header "Accept: application/vnd.github.raw+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/blobs/f2a8878781b56bef9f6ccfde354f0d40775d0d60" \
            --output /tmp/phase0-payload.tar.gz

          echo "452d9b1b6d3d08e1cf9ac2b8044637e6ece61b26eb74ba48f1171274df69adc0  /tmp/phase0-payload.tar.gz" | sha256sum --check
          tar -xzf /tmp/phase0-payload.tar.gz -C .

          rm -rf .phase0
          rm -f \
            .github/workflows/phase0-baseline.yml \
            .github/workflows/phase0-dependencies.yml \
            .github/workflows/phase0-finalize.yml \
            PNPM_VERCEL_FIX.md \
            tests/security-regression.test.mjs \
            tsconfig.tsbuildinfo

      - name: Generate the Yarn 1 lockfile
        run: yarn install --non-interactive

      - name: Format Phase 0 files
        run: yarn format

      - name: Verify formatting
        run: yarn format:check

      - name: Run lint, types, Vitest, and production build
        run: yarn check

      - name: Install Playwright Chromium
        run: yarn playwright install --with-deps chromium

      - name: Run critical browser flows with mocked external APIs
        run: yarn test:e2e

      - name: Commit verified Phase 0 changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No Phase 0 changes to commit."
            exit 0
          fi

          git commit -m "chore: complete phase 0 repository foundation"
          git push origin HEAD:agent/phase-0-repository-foundation

      - name: Mark the final commit as verified
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          final_sha="$(git rev-parse HEAD)"
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${final_sha}" \
            --data '{"state":"success","context":"phase0/verified","description":"Yarn, lint, types, Vitest, build and Playwright passed"}'
