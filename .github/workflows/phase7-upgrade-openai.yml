name: Phase 7 Upgrade OpenAI SDK

on:
  push:
    branches: [agent/phase-7-real-altr-twin-ai-mvp-v2]
    paths: [.github/workflows/phase7-upgrade-openai.yml]

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase-7-real-altr-twin-ai-mvp-v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - run: npm install --global yarn@1.22.22
      - run: yarn add --exact openai@6.46.0
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json yarn.lock
          git commit -m "chore(ai): upgrade official OpenAI SDK"
          git push origin HEAD:agent/phase-7-real-altr-twin-ai-mvp-v2
